<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Video</title>

    <!-- Open Graph meta tags so the link shows as a proper URL preview when shared -->
    <meta property="og:title" content="Happy Birthday Ola!">
    <meta property="og:description" content="A special birthday surprise just for you!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://happybirthdayola.netlify.app">
    <meta property="og:image" content="https://happybirthdayola.netlify.app/images.jpeg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Happy Birthday Ola!">
    <meta name="twitter:description" content="A special birthday surprise just for you!">
    <meta name="twitter:image" content="https://happybirthdayola.netlify.app/images.jpeg">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(90, 4, 12);
            text-align: center;
            overflow: hidden;
        }

        /* Responsive video container */
        .responsive-video {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
        }
        .responsive-video video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgb(90, 4, 12);
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #ff4081;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: white;
            font-family: 'Comic Sans MS', cursive;
            font-size: 1.2rem;
            margin-top: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Make the video element clearly interactive for touch/keyboard */
        #videoSticker { cursor: pointer; outline: none; }
        #videoSticker:focus { box-shadow: 0 0 0 3px rgba(255,64,129,0.5); }
        #videoSticker:hover { opacity: 0.95; box-shadow: 0 0 20px rgba(255, 64, 129, 0.6); }

        /* Ensure tappable targets and readable text on small screens */
        button, a, video { min-height: 44px; min-width: 44px; }
        html { font-size: 16px; }
        @media (max-width: 480px) { html { font-size: 15px; } }

        /* Screen-reader only text */
        .sr-only { position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="responsive-video" role="region" aria-label="Birthday video">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <p class="loading-text">Loading birthday surprise...</p>
        </div>
        <video id="videoSticker" autoplay muted playsinline preload="auto" tabindex="0" aria-describedby="video-transcript">
            <source src="vecteezy_animated-birthday-wishes-handwriting-with-ink-drop-happy_16090923.mp4" type="video/mp4">
            <track kind="captions" srclang="en" label="English" src="captions_en.vtt">
            Your browser does not support the video tag. Full transcript: <a href="transcript.html">Transcript</a>
        </video>
    </div>
    <p id="video-transcript" class="sr-only">Transcript available at the linked transcript page.</p>

    <script>
        const video = document.getElementById("videoSticker");
        const loadingOverlay = document.getElementById("loadingOverlay");

        // Hide loading overlay once video can play
        function hideLoading() {
            loadingOverlay.classList.add("hidden");
            // Try to play the video
            video.play().catch(function() {
                // Autoplay blocked - user needs to tap
                loadingOverlay.innerHTML = '<p class="loading-text" style="cursor:pointer;">Tap to play</p>';
                loadingOverlay.classList.remove("hidden");
                loadingOverlay.addEventListener("click", function() {
                    video.play();
                    loadingOverlay.classList.add("hidden");
                });
            });
        }

        video.addEventListener("canplay", hideLoading);

        // Fallback: if video is already ready
        if (video.readyState >= 3) {
            hideLoading();
        }

        // Fallback timeout: hide loader after 8 seconds even if still buffering
        setTimeout(function() {
            if (!loadingOverlay.classList.contains("hidden")) {
                hideLoading();
            }
        }, 8000);

        // Click or keyboard activation goes to main page
        function goToMain() { window.location.href = "main.html"; }

        video.addEventListener("click", goToMain);
        video.addEventListener("ended", goToMain);

        // Make Enter/Space activate the video click behaviour for keyboard users
        video.addEventListener("keydown", function(e) {
            var key = e.key || e.keyCode;
            if (key === 'Enter' || key === ' ' || key === 13 || key === 32) {
                e.preventDefault();
                goToMain();
            }
        });
    </script>
</body>
</html>
