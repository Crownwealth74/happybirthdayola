<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(90, 4, 12);
            text-align: center;
            overflow: hidden;
        }

        /* Responsive video container */
        .responsive-video { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
        }
        .responsive-video video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: cover;
        }

        /* Video plays inline - no interaction needed */
        #videoSticker { cursor: pointer; outline: none; pointer-events: none; }

        html { font-size: 16px; }
        @media (max-width: 480px) { html { font-size: 15px; } }

        /* Screen-reader only text */
        .sr-only { position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="responsive-video" role="region" aria-label="Birthday video">
        <video id="videoSticker" autoplay muted playsinline preload="auto" tabindex="0" aria-describedby="video-transcript">
            <source src="vecteezy_animated-birthday-wishes-handwriting-with-ink-drop-happy_16090923.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <!-- optional external audio that plays alongside the video -->
        <!-- <audio id="videoAudio" src="audio.mp3" preload="auto"></audio> -->
    </div>
    <p id="video-transcript" class="sr-only">Transcript available at the linked transcript page.</p>

    <script>
        const video = document.getElementById("videoSticker");

        // Navigate to main page when video ends
        video.addEventListener("ended", function() {
            window.location.href = "main.html";
        });

        // Ensure autoplay works on mobile - retry if blocked
        function tryPlay() {
            video.play().catch(function() {
                // If autoplay is blocked, listen for first touch to start
                document.addEventListener("touchstart", function handler() {
                    video.play();
                    document.removeEventListener("touchstart", handler);
                }, { once: true });
                document.addEventListener("click", function handler() {
                    video.play();
                    document.removeEventListener("click", handler);
                }, { once: true });
            });
        }

        // Try playing immediately and also on load
        tryPlay();
        window.addEventListener("load", tryPlay);
    </script>
</body>
</html>
